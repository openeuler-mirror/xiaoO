<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawTrace - Distributed Trace Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.3) translateY(-20px);
            }
            50% {
                opacity: 1;
                transform: scale(1.05);
            }
            70% {
                transform: scale(0.9);
            }
            100% {
                transform: scale(1) translateY(0);
            }
        }
        
        @keyframes highlightPulse {
            0% { background-color: #fef08a; }
            100% { background-color: transparent; }
        }
        
        .new-trace-row {
            animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        .highlight-row {
            animation: highlightPulse 2s ease-out forwards;
        }
        
        .trace-row {
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="toast" class="fixed top-4 -right-32 bg-green-600 text-white px-4 py-2 rounded shadow-lg transition-all duration-300 z-50">
        刷新成功
    </div>
    
    <div id="delete-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 max-w-sm mx-4">
            <h3 class="text-lg font-bold mb-4">确认删除</h3>
            <p class="text-gray-600 mb-6">确定要删除这条trace吗？此操作不可撤销。</p>
            <div class="flex justify-end gap-3">
                <button id="btn-cancel-delete" class="px-4 py-2 bg-gray-200 text-gray-800 rounded hover:bg-gray-300">
                    取消
                </button>
                <button id="btn-confirm-delete" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">
                    删除
                </button>
            </div>
        </div>
    </div>
    
    <div class="flex h-screen">
        <nav class="w-48 bg-gray-900 text-white p-4 flex flex-col">
            <h1 class="text-2xl font-bold mb-8">ClawTrace</h1>
            <div class="space-y-2 flex-1">
                <button id="btn-trace-list" class="w-full text-left px-4 py-2 rounded hover:bg-gray-700 bg-blue-600">
                    Trace List
                </button>
                <button id="btn-trace-detail" class="w-full text-left px-4 py-2 rounded hover:bg-gray-700">
                    Trace Detail
                </button>
            </div>
            <div class="pt-4 border-t border-gray-700">
                <button id="btn-auto-refresh" class="w-full flex items-center justify-center gap-2 px-4 py-2 rounded hover:bg-gray-700 text-gray-400 hover:text-white transition-colors" title="Auto Refresh">
                    <svg id="refresh-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                    </svg>
                    <span id="refresh-label">Auto</span>
                </button>
            </div>
        </nav>

        <main class="flex-1 overflow-auto">
            <div id="trace-list" class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-3xl font-bold">Traces</h2>
                    <div class="flex gap-4">
                        <label class="flex items-center gap-2">
                            <input type="checkbox" id="filter-alive" class="rounded">
                            <span>Show alive only</span>
                        </label>
                        <button id="btn-refresh" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                            </svg>
                            Refresh
                        </button>
                    </div>
                </div>
                <div id="trace-list-content">
                    <p class="text-gray-600">Loading...</p>
                </div>
            </div>

            <div id="span-tree" class="hidden p-6 h-full flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <button id="btn-back" class="px-4 py-2 bg-gray-600 text-white rounded hover:bg-gray-700">
                        ← Back to Traces
                    </button>
                    <button id="btn-refresh-detail" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                        Refresh
                    </button>
                </div>
                
                <div class="flex-1 flex flex-col min-h-0 overflow-auto">
                    <div class="mb-4">
                        <h3 class="text-lg font-semibold mb-2">Timeline</h3>
                        <div id="timeline-content" class="bg-white p-4 rounded border"></div>
                    </div>
                    
                    <div>
                        <h3 class="text-lg font-semibold mb-2">Span Details</h3>
                        <div id="detail-content" class="bg-white p-4 rounded border">
                            <p class="text-gray-500">Click a span in timeline to view details</p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="timeline" class="hidden p-6">
                <h2 class="text-3xl font-bold mb-4">Timeline</h2>
                <div id="timeline-standalone-content"></div>
            </div>

            <div id="detail-panel" class="hidden p-6">
                <h2 class="text-3xl font-bold mb-4">Details</h2>
                <div id="detail-standalone-content"></div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
    <script src="timeline.js"></script>
</body>
</html>
